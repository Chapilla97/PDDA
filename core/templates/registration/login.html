<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login - CINASI</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 h-screen flex items-center justify-center">
    <div
      class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md border-t-4 border-blue-600"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Bienvenido</h1>
        <p class="text-gray-500">Sistema de Gestión de Disolución</p>
      </div>

      <form method="post" class="space-y-6">
        {% csrf_token %} {% if form.errors %}
        <div class="bg-red-50 text-red-600 p-3 rounded text-sm text-center">
          Usuario o contraseña incorrectos.
        </div>
        {% endif %}

        <div>
          <label class="block text-gray-700 font-bold mb-2">Usuario</label>
          <input
            type="text"
            name="username"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500"
            placeholder="Ej. jcalidad"
            required
          />
        </div>

        <div>
          <label class="block text-gray-700 font-bold mb-2">Contraseña</label>
          <input
            type="password"
            name="password"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500"
            placeholder="••••••••"
            required
          />
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-300"
        >
          Iniciar Sesión
        </button>
      </form>

      <p class="mt-6 text-center text-gray-400 text-xs">
        © 2026 CINASI / UNEBI - Área de TI
      </p>
    </div>
  </body>
</html>
