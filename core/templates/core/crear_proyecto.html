<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Nuevo Proyecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen p-10">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-lg">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">
          ✨ Crear Nuevo Proyecto
        </h1>
        <a href="/" class="text-blue-600 hover:underline">Volver</a>
      </div>

      <form method="post">
        {% csrf_token %}

        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">Nombre del Proyecto / Lote</label>
          <input type="text" name="titulo" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. Validación Lote X-2026" required>
        </div>

        <div class="mb-6">
          <label class="block text-gray-700 font-bold mb-2">Asignar Analista</label>
          <div class="relative">
              <select name="analista_id" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-white" required>
                <option value="" disabled selected>-- Selecciona un usuario --</option>
                {% for user in analistas %}
                    <option value="{{ user.id }}">
                        {{ user.first_name }} {{ user.last_name }} ({{ user.username }})
                    </option>
                {% endfor %}
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                <i class="fa-solid fa-chevron-down text-xs"></i>
              </div>
          </div>
          <p class="text-sm text-gray-500 mt-1">
            Usuarios disponibles en el sistema.
          </p>
        </div>

        <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">
          Guardar y Asignar
        </button>
      </form>
    </div>
  </body>
</html>
