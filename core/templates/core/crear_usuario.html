<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Nuevo Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h1 class="text-2xl font-bold mb-6 text-slate-800">Registrar Personal</h1>
        
        <form method="post">
            {% csrf_token %}
            {% if messages %}
                {% for message in messages %}
                    <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <div class="space-y-4">
                {% for field in form %}
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
            </div>

            <div class="mt-6 flex gap-3">
                <a href="{% url 'administrar_usuarios' %}" class="flex-1 bg-slate-200 text-slate-700 py-2 rounded text-center hover:bg-slate-300">Cancelar</a>
                <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700 font-bold">Guardar</button>
            </div>
        </form>
    </div>
</body>
</html>
